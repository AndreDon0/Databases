<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Стеллажи — Управление складом</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="header">
      <div>
        <h1>Стеллажи</h1>
        <p class="subtitle"><a href="/">← На главную</a></p>
      </div>
    </header>

    <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

    <main class="page-main">
      <section class="card">
        <div class="toolbar toolbar-wrap">
          <div class="room-filter">
            <label class="room-filter-label" for="filter-room">Помещение</label>
            <select id="filter-room" class="room-filter-select" aria-label="Фильтр по помещению">
              <option value="">Все помещения</option>
            </select>
          </div>
          <button type="button" id="btn-all-racks" class="btn primary">Все стеллажи</button>
          <label class="inline-label page-size-field">
            Показать
            <input
              type="number"
              id="racks-page-size"
              class="page-size-input"
              min="1"
              max="500"
              step="1"
              value="50"
              title="Количество записей на странице (не более 500)"
            />
            <span class="page-size-suffix">шт.</span>
          </label>
        </div>

        <div class="toolbar">
          <button type="button" id="racks-prev" class="btn">← Предыдущая</button>
          <span id="racks-page-label" class="page-label"></span>
          <button type="button" id="racks-next" class="btn">Следующая →</button>
        </div>

        <div class="table-scroll">
          <table class="data-table">
            <thead>
              <tr>
                <th class="th-sort">
                  №
                  <span class="sort-group">
                    <button type="button" class="sort-arrow" data-sort="id_rack" data-order="asc">↑</button>
                    <button type="button" class="sort-arrow" data-sort="id_rack" data-order="desc">↓</button>
                  </span>
                </th>
                <th class="th-sort">
                  Помещение
                  <span class="sort-group">
                    <button type="button" class="sort-arrow" data-sort="room_name" data-order="asc">↑</button>
                    <button type="button" class="sort-arrow" data-sort="room_name" data-order="desc">↓</button>
                  </span>
                </th>
                <th class="th-sort">
                  Номер
                  <span class="sort-group">
                    <button type="button" class="sort-arrow" data-sort="rack_number" data-order="asc">↑</button>
                    <button type="button" class="sort-arrow" data-sort="rack_number" data-order="desc">↓</button>
                  </span>
                </th>
                <th class="th-sort">
                  Слоты
                  <span class="sort-group">
                    <button type="button" class="sort-arrow" data-sort="storage_slots" data-order="asc">↑</button>
                    <button type="button" class="sort-arrow" data-sort="storage_slots" data-order="desc">↓</button>
                  </span>
                </th>
                <th class="th-sort">
                  Макс. кг
                  <span class="sort-group">
                    <button type="button" class="sort-arrow" data-sort="max_load" data-order="asc">↑</button>
                    <button type="button" class="sort-arrow" data-sort="max_load" data-order="desc">↓</button>
                  </span>
                </th>
                <th class="th-sort">
                  Высота
                  <span class="sort-group">
                    <button type="button" class="sort-arrow" data-sort="height" data-order="asc">↑</button>
                    <button type="button" class="sort-arrow" data-sort="height" data-order="desc">↓</button>
                  </span>
                </th>
                <th class="th-sort">
                  Ширина
                  <span class="sort-group">
                    <button type="button" class="sort-arrow" data-sort="width" data-order="asc">↑</button>
                    <button type="button" class="sort-arrow" data-sort="width" data-order="desc">↓</button>
                  </span>
                </th>
                <th class="th-sort">
                  Длина
                  <span class="sort-group">
                    <button type="button" class="sort-arrow" data-sort="length" data-order="asc">↑</button>
                    <button type="button" class="sort-arrow" data-sort="length" data-order="desc">↓</button>
                  </span>
                </th>
                <th></th>
              </tr>
            </thead>
            <tbody id="racks-body"></tbody>
          </table>
        </div>

        <details class="panel">
          <summary>Добавить стеллаж</summary>
          <form id="rack-create" class="form-grid inner-form">
            <label>
              Помещение
              <select name="room_name" id="rack-create-room" required></select>
            </label>
            <label>
              Номер стеллажа
              <input name="rack_number" required maxlength="20" autocomplete="off" />
            </label>
            <label>
              Число мест
              <input name="storage_slots" type="number" min="1" required />
            </label>
            <label>
              Макс. нагрузка, кг
              <input name="max_load" type="number" step="0.01" min="0.01" required />
            </label>
            <label>
              Высота, м
              <input name="height" type="number" step="0.001" min="0.001" required />
            </label>
            <label>
              Ширина, м
              <input name="width" type="number" step="0.001" min="0.001" required />
            </label>
            <label>
              Длина, м
              <input name="length" type="number" step="0.001" min="0.001" required />
            </label>
            <button type="submit" class="btn primary">Создать</button>
          </form>
        </details>

        <details id="rack-edit-wrap" class="panel">
          <summary>Изменить стеллаж</summary>
          <form id="rack-edit" class="form-grid inner-form">
            <input type="hidden" name="original_room_name" />
            <input type="hidden" name="original_rack_number" />
            <p class="hint" id="rack-edit-context"></p>
            <label>
              Номер стеллажа
              <input name="rack_number" required maxlength="20" />
            </label>
            <label>
              Число мест
              <input name="storage_slots" type="number" min="1" required />
            </label>
            <label>
              Макс. нагрузка
              <input name="max_load" type="number" step="0.01" min="0.01" required />
            </label>
            <label>
              Высота
              <input name="height" type="number" step="0.001" min="0.001" required />
            </label>
            <label>
              Ширина
              <input name="width" type="number" step="0.001" min="0.001" required />
            </label>
            <label>
              Длина
              <input name="length" type="number" step="0.001" min="0.001" required />
            </label>
            <div class="form-actions">
              <button type="submit" class="btn primary">Сохранить</button>
              <button type="button" id="rack-edit-cancel" class="btn ghost">Закрыть</button>
            </div>
          </form>
        </details>
      </section>
    </main>

    <footer class="footer">
      <span>Управление складом</span>
    </footer>

    <script type="module" src="/static/racks.js"></script>
  </body>
</html>
